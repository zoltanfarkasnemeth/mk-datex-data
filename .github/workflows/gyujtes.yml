name: MK DATEX II Adatgyűjtés

on:
  schedule:
    - cron: '*/5 * * * *'   # minden 5 percben
  workflow_dispatch:          # kézi indítás is lehetséges

permissions:
  contents: write             # szükséges a commit/push-hoz

jobs:
  gyujtes:
    runs-on: ubuntu-latest

    steps:
      - name: Repo klónozása
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python beállítása
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Függőségek telepítése
        run: pip install requests pandas lxml openpyxl

      - name: Adatgyűjtés futtatása
        run: python mk_datex_gyujto.py

      - name: Változások commitálása és pusholása
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Data.xlsx data.json MK_adat_elemzes/ || true
          git diff --cached --quiet && echo "Nincs változás" || (
            git commit -m "Automatikus frissítés: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          )
